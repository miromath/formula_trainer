<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тела вращения — тренажёр</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Code+Pro:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --border: #d0d7ea;
    --accent: #3b6fd4;
    --green: #1aaa5e;
    --green-light: #e6f7ef;
    --green-border: #52c98a;
    --red: #e03e3e;
    --red-light: #fdeaea;
    --text: #1e2340;
    --muted: #6b74a0;
    --formula-bg: #eef1f9;
    --shadow-card: 0 4px 24px rgba(60,80,160,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 28px 12px 60px;
    background-image:
      radial-gradient(ellipse at 15% 0%, #dce8ff 0%, transparent 55%),
      radial-gradient(ellipse at 85% 90%, #e8f0ff 0%, transparent 55%);
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 4vw, 2.1rem);
    text-align: center;
    color: #1e2d6b;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: .88rem;
    margin-bottom: 22px;
    line-height: 1.5;
  }
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 20px;
    font-size: .92rem;
  }
  .score-bar span { color: var(--muted); }
  #correct-count { color: var(--green); font-weight: 700; }
  #total-count { color: var(--accent); font-weight: 700; }

  .trainer {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ===== FIGURE CARDS ===== */
  .figure-row { display: flex; flex-direction: column; gap: 14px; }

  .figure-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 16px 14px 14px;
    box-shadow: var(--shadow-card);
    transition: border-color .3s, box-shadow .3s, background .3s;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 14px;
  }
  .figure-card.matched {
    border-color: var(--green-border);
    background: var(--green-light);
    box-shadow: 0 4px 28px rgba(26,170,94,0.13);
  }
  .figure-left {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    min-width: 80px; flex-shrink: 0;
  }
  .figure-name {
    font-family: 'Playfair Display', serif;
    font-size: .95rem; color: #1e2d6b; text-align: center;
  }
  .figure-card svg { filter: drop-shadow(0 2px 8px rgba(60,100,200,0.13)); }
  .drop-zones { flex: 1; display: flex; flex-direction: column; gap: 7px; min-width: 0; }

  .drop-zone {
    width: 100%; min-height: 42px;
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    padding: 5px 8px;
    font-family: 'Source Code Pro', monospace; font-size: .76rem;
    color: var(--muted); background: var(--bg);
    cursor: pointer;
    transition: border-color .2s, background .2s, color .2s;
    text-align: center; position: relative;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .drop-zone .zone-label {
    position: absolute; top: -9px; left: 7px;
    font-size: .6rem; font-family: 'Nunito', sans-serif;
    color: var(--muted); background: var(--card);
    padding: 0 3px; border-radius: 4px; white-space: nowrap;
  }
  .figure-card.matched .drop-zone .zone-label { background: var(--green-light); }
  .drop-zone:not(.correct):hover { border-color: var(--accent); background: #eef3ff; }
  .drop-zone.correct {
    border-color: var(--green-border); border-style: solid;
    background: var(--green-light); color: #157a46; cursor: default;
  }
  .drop-zone.wrong { border-color: var(--red); background: var(--red-light); animation: shake .35s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }

  /* ===== PICKER OVERLAY ===== */
  .picker-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(30,35,80,0.40); z-index: 100;
    align-items: flex-end; justify-content: center;
    backdrop-filter: blur(2px);
    /* allow scrolling the background page when touching overlay bg */
    touch-action: none;
  }
  .picker-overlay.open { display: flex; animation: overlayIn .18s ease; }
  @keyframes overlayIn { from{opacity:0} to{opacity:1} }

  .picker-sheet {
    background: #fff;
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 700px;
    padding: 0 0 32px;
    box-shadow: 0 -4px 32px rgba(60,80,160,0.18);
    animation: sheetUp .22s ease;
    max-height: 75vh;
    display: flex; flex-direction: column;
    /* allow scroll inside sheet only */
    touch-action: pan-y;
  }
  @keyframes sheetUp { from{transform:translateY(50px);opacity:0} to{transform:translateY(0);opacity:1} }

  .picker-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 10px; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .picker-title {
    font-family: 'Nunito', sans-serif; font-size: .82rem; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: .06em;
  }
  .picker-close {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--formula-bg); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; color: var(--muted); padding: 0; box-shadow: none;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .picker-close:hover { background: #dce8ff; color: var(--accent); }

  .picker-scroll {
    overflow-y: auto; flex: 1;
    padding: 12px 14px 0;
    -webkit-overflow-scrolling: touch;
  }
  .picker-grid { display: flex; flex-direction: column; gap: 8px; padding-bottom: 4px; }

  /* chip in picker — two states: normal and selected */
  .picker-chip {
    background: var(--formula-bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px 11px 12px;
    font-family: 'Source Code Pro', monospace; font-size: .82rem;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: background .15s, border-color .15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    position: relative;
  }
  .picker-chip .chip-label {
    font-size: .64rem; font-family: 'Nunito', sans-serif;
    color: var(--muted); white-space: nowrap; min-width: 120px;
  }
  .picker-chip .chip-check {
    margin-left: auto; flex-shrink: 0;
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--border); background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: .85rem; color: transparent;
    transition: background .15s, border-color .15s, color .15s;
  }
  .picker-chip.chip-selected {
    border-color: var(--accent); background: #dce8ff;
  }
  .picker-chip.chip-selected .chip-check {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .picker-chip:not(.used):hover { background: #eef3ff; border-color: #a0b8e8; }
  .picker-chip.used { opacity: .22; pointer-events: none; }

  /* confirm button */
  .picker-confirm-row {
    padding: 12px 14px 0; flex-shrink: 0;
  }
  .btn-confirm {
    width: 100%; padding: 13px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 12px;
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; opacity: .45; pointer-events: none;
    transition: opacity .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-confirm.active { opacity: 1; pointer-events: auto; }
  .btn-confirm.active:hover { background: #2d5ab8; }

  /* ===== MAIN BUTTONS ===== */
  .btn-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  button {
    border: none; border-radius: 10px; padding: 11px 24px;
    font-family: 'Nunito', sans-serif; font-size: .93rem; font-weight: 700;
    cursor: pointer; transition: filter .2s, transform .1s;
    box-shadow: 0 2px 8px rgba(60,80,160,0.10);
    -webkit-tap-highlight-color: transparent;
  }
  button:hover { filter: brightness(1.06); transform: translateY(-1px); }
  #btn-reset { background: #e8ecf7; color: var(--text); }
  #btn-hint  { background: #dce8ff; color: #1e3a8a; }

  /* ===== SUCCESS ===== */
  #success-banner {
    display: none; text-align: center;
    background: var(--green-light); border: 2px solid var(--green-border);
    border-radius: 16px; padding: 20px;
    font-size: 1.1rem; font-family: 'Playfair Display', serif; color: var(--green);
    box-shadow: 0 4px 24px rgba(26,170,94,0.13);
    animation: fadeIn .5s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .footer {
    text-align: center; margin-top: 28px;
    font-size: .82rem; color: var(--muted); line-height: 1.6;
  }
  .footer a { color: var(--accent); text-decoration: none; font-weight: 700; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Тела вращения</h1>
<p class="subtitle">Нажми на клетку, выбери формулу и подтверди галочкой</p>

<div class="score-bar">
  <span>Верно: <b id="correct-count">0</b></span>
  <span>Всего: <b id="total-count">0</b></span>
</div>

<div class="trainer">
  <div class="figure-row" id="figure-row"></div>

  <div class="btn-row">
    <button id="btn-reset">↺ Сбросить</button>
    <button id="btn-hint">💡 Подсказка</button>
  </div>

  <div id="success-banner">🎉 Все формулы расставлены правильно! Отлично!</div>
</div>

<!-- Picker -->
<div class="picker-overlay" id="picker-overlay">
  <div class="picker-sheet" id="picker-sheet">
    <div class="picker-header">
      <span class="picker-title" id="picker-title">Выбери формулу</span>
      <button class="picker-close" id="picker-close" aria-label="Закрыть">✕</button>
    </div>
    <div class="picker-scroll" id="picker-scroll">
      <div class="picker-grid" id="picker-grid"></div>
    </div>
    <div class="picker-confirm-row">
      <button class="btn-confirm" id="btn-confirm">✓ Подтвердить</button>
    </div>
  </div>
</div>

<div class="footer">
  Ещё больше материалов: <a href="https://t.me/igrotekamath" target="_blank">https://t.me/igrotekamath</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
<script>
/* =====================================================================
   DATA — correct formulas
   ===================================================================== */
const FIGURES = [
  {
    id: 'cylinder',
    name: 'Цилиндр',
    svg: `<svg width="82" height="90" viewBox="0 0 82 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="41" cy="22" rx="30" ry="9" fill="#dce8ff" stroke="#3b6fd4" stroke-width="1.8"/>
      <rect x="11" y="22" width="60" height="54" fill="#eef3ff"/>
      <ellipse cx="41" cy="76" rx="30" ry="9" fill="#c8d9f7" stroke="#3b6fd4" stroke-width="1.8"/>
      <line x1="11" y1="22" x2="11" y2="76" stroke="#3b6fd4" stroke-width="1.8"/>
      <line x1="71" y1="22" x2="71" y2="76" stroke="#3b6fd4" stroke-width="1.8"/>
      <ellipse cx="41" cy="22" rx="30" ry="9" fill="none" stroke="#3b6fd4" stroke-width="1.8"/>
      <line x1="41" y1="76" x2="71" y2="76" stroke="#e03e3e" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="56" y="90" text-anchor="middle" fill="#e03e3e" font-size="12" font-family="serif" font-style="italic">r</text>
      <line x1="78" y1="22" x2="78" y2="76" stroke="#1aaa5e" stroke-width="1.4" stroke-dasharray="3,2"/>
      <line x1="74" y1="22" x2="82" y2="22" stroke="#1aaa5e" stroke-width="1.2"/>
      <line x1="74" y1="76" x2="82" y2="76" stroke="#1aaa5e" stroke-width="1.2"/>
      <text x="80" y="53" fill="#1aaa5e" font-size="12" font-family="serif" font-style="italic" text-anchor="start">h</text>
    </svg>`,
    zones: ['V','S','Sb'],
    formulas: {
      V:  { latex: 'V = \\pi r^2 h',             label: 'Объём' },
      S:  { latex: 'S = 2\\pi r h + 2\\pi r^2',  label: 'Полная поверхность' },
      Sb: { latex: 'S_{бок} = 2\\pi r h',         label: 'Боковая поверхность' },
    }
  },
  {
    id: 'cone',
    name: 'Конус',
    svg: `<svg width="82" height="90" viewBox="0 0 82 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="41" cy="78" rx="30" ry="9" fill="#c8d9f7" stroke="#3b6fd4" stroke-width="1.8"/>
      <polygon points="41,10 11,78 71,78" fill="#eef3ff"/>
      <line x1="11" y1="78" x2="41" y2="10" stroke="#3b6fd4" stroke-width="1.8"/>
      <line x1="71" y1="78" x2="41" y2="10" stroke="#3b6fd4" stroke-width="1.8"/>
      <ellipse cx="41" cy="78" rx="30" ry="9" fill="none" stroke="#3b6fd4" stroke-width="1.8"/>
      <line x1="41" y1="78" x2="71" y2="78" stroke="#e03e3e" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="56" y="94" text-anchor="middle" fill="#e03e3e" font-size="12" font-family="serif" font-style="italic">r</text>
      <line x1="41" y1="10" x2="41" y2="78" stroke="#1aaa5e" stroke-width="1.4" stroke-dasharray="3,2"/>
      <text x="44" y="50" fill="#1aaa5e" font-size="12" font-family="serif" font-style="italic">h</text>
      <text x="20" y="50" fill="#8855cc" font-size="12" font-family="serif" font-style="italic">l</text>
    </svg>`,
    zones: ['V','S','Sb'],
    formulas: {
      V:  { latex: 'V = \\dfrac{1}{3}\\pi r^2 h',   label: 'Объём' },
      S:  { latex: 'S = \\pi r l + \\pi r^2',        label: 'Полная поверхность' },
      Sb: { latex: 'S_{бок} = \\pi r l',             label: 'Боковая поверхность' },
    }
  },
  {
    id: 'sphere',
    name: 'Шар',
    svg: `<svg width="82" height="82" viewBox="0 0 82 82" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="sg2" cx="38%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#dce8ff"/>
          <stop offset="100%" stop-color="#b0c8f0"/>
        </radialGradient>
      </defs>
      <circle cx="41" cy="41" r="32" fill="url(#sg2)" stroke="#3b6fd4" stroke-width="1.8"/>
      <ellipse cx="41" cy="41" rx="32" ry="10" fill="none" stroke="#3b6fd4" stroke-width="1.2" stroke-dasharray="4,3" opacity=".6"/>
      <line x1="41" y1="41" x2="73" y2="41" stroke="#e03e3e" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="55" y="37" fill="#e03e3e" font-size="12" font-family="serif" font-style="italic">r</text>
    </svg>`,
    zones: ['V','S'],  /* NO Sb for sphere */
    formulas: {
      V:  { latex: 'V = \\dfrac{4}{3}\\pi r^3',  label: 'Объём' },
      S:  { latex: 'S = 4\\pi r^2',              label: 'Полная поверхность' },
    }
  },
];

/* DECOY formulas — wrong answers to confuse */
const DECOYS = [
  { id: 'd1',  latex: 'V = \\dfrac{2}{3}\\pi r^3',          label: 'Объём' },
  { id: 'd2',  latex: 'V = \\pi r^2 l',                      label: 'Объём' },
  { id: 'd3',  latex: 'S = \\pi r^2 + \\pi r l^2',           label: 'Полная поверхность' },
  { id: 'd4',  latex: 'S = 2\\pi r^2 h',                     label: 'Полная поверхность' },
  { id: 'd5',  latex: 'S_{бок} = \\pi r^2 l',                label: 'Боковая поверхность' },
  { id: 'd6',  latex: 'V = \\dfrac{1}{2}\\pi r^2 h',         label: 'Объём' },
  { id: 'd7',  latex: 'S = 2\\pi r h',                       label: 'Полная поверхность' },
  { id: 'd8',  latex: 'S_{бок} = 2\\pi r^2',                 label: 'Боковая поверхность' },
  { id: 'd9',  latex: 'S = 2\\pi r^2',                       label: 'Полная поверхность' },
  { id: 'd10', latex: 'V = 4\\pi r^2',                       label: 'Объём' },
];

/* Build correct chips list */
const CORRECT_CHIPS = [];
FIGURES.forEach(fig => {
  fig.zones.forEach(type => {
    CORRECT_CHIPS.push({
      id: `${fig.id}_${type}`,
      figureId: fig.id,
      type,
      latex: fig.formulas[type].latex,
      label: fig.formulas[type].label,
      isDecoy: false,
    });
  });
});

const ALL_CHIPS = [
  ...CORRECT_CHIPS,
  ...DECOYS.map(d => ({ ...d, figureId: null, type: null, isDecoy: true })),
];

/* =====================================================================
   STATE
   ===================================================================== */
let correctCount = 0;
const totalPairs = CORRECT_CHIPS.length;

let activeZone = null;   // { figureId, type, el }
let selectedChipId = null;

/* =====================================================================
   BUILD UI
   ===================================================================== */
function buildUI() {
  correctCount = 0;
  selectedChipId = null;
  activeZone = null;
  buildFigureCards();
  buildPickerChips();
  updateScore();
}

function buildFigureCards() {
  const row = document.getElementById('figure-row');
  row.innerHTML = '';
  FIGURES.forEach(fig => {
    const card = document.createElement('div');
    card.className = 'figure-card';
    card.id = `card-${fig.id}`;
    card.innerHTML = `
      <div class="figure-left">
        <div class="figure-name">${fig.name}</div>
        ${fig.svg}
      </div>
      <div class="drop-zones">
        ${fig.zones.map(type => `
          <div class="drop-zone"
               id="zone-${fig.id}-${type}"
               data-figure="${fig.id}"
               data-type="${type}">
            <span class="zone-label">${fig.formulas[type].label}</span>
            <span class="zone-placeholder">нажми, чтобы выбрать</span>
          </div>
        `).join('')}
      </div>`;
    row.appendChild(card);
  });
  document.querySelectorAll('.drop-zone').forEach(attachZone);
}

function attachZone(zone) {
  zone.addEventListener('click', onZoneClick);
  zone.addEventListener('touchstart', e => { e._isTouchOnZone = true; }, { passive: true });
  zone.addEventListener('touchend', e => {
    if(e._isTouchOnZone) { e.preventDefault(); onZoneClick({ currentTarget: zone }); }
  });
}

function buildPickerChips() {
  const grid = document.getElementById('picker-grid');
  grid.innerHTML = '';
  // shuffle ALL chips
  const shuffled = [...ALL_CHIPS].sort(() => Math.random() - .5);
  shuffled.forEach(chip => {
    const el = document.createElement('div');
    el.className = 'picker-chip';
    el.id = `pchip-${chip.id}`;
    el.dataset.chipId = chip.id;
    el.innerHTML = `
      <span class="chip-label">${chip.label}</span>
      <span class="chip-math">\\(${chip.latex}\\)</span>
      <span class="chip-check">✓</span>`;
    el.addEventListener('click', () => onSelectChip(chip.id, el));
    // touch: only fire on tap-end without significant scroll
    let touchStartY = 0;
    el.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
    el.addEventListener('touchend', e => {
      const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
      if(dy < 10) { e.preventDefault(); onSelectChip(chip.id, el); }
    });
    grid.appendChild(el);
  });
  setTimeout(() => { if(window.MathJax) MathJax.typesetPromise(); }, 120);
}

/* =====================================================================
   PICKER OPEN / CLOSE
   ===================================================================== */
function onZoneClick(e) {
  const zone = e.currentTarget;
  if(zone.classList.contains('correct')) return;
  activeZone = { figureId: zone.dataset.figure, type: zone.dataset.type, el: zone };
  selectedChipId = null;
  // clear previous selection
  document.querySelectorAll('.picker-chip.chip-selected').forEach(c => c.classList.remove('chip-selected'));
  updateConfirmBtn();
  const fig = FIGURES.find(f => f.id === activeZone.figureId);
  document.getElementById('picker-title').textContent =
    `${fig.name} — ${fig.formulas[activeZone.type].label}`;
  document.getElementById('picker-overlay').classList.add('open');
  // scroll picker to top
  document.getElementById('picker-scroll').scrollTop = 0;
}

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('open');
  selectedChipId = null;
  document.querySelectorAll('.picker-chip.chip-selected').forEach(c => c.classList.remove('chip-selected'));
  updateConfirmBtn();
  activeZone = null;
}

// Close on backdrop tap
document.getElementById('picker-overlay').addEventListener('touchstart', e => {
  if(e.target === document.getElementById('picker-overlay')) { e.preventDefault(); closePicker(); }
}, { passive: false });
document.getElementById('picker-overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('picker-overlay')) closePicker();
});
document.getElementById('picker-close').addEventListener('click', closePicker);

// Prevent sheet touch events from bubbling to overlay
document.getElementById('picker-sheet').addEventListener('touchstart', e => e.stopPropagation(), { passive: true });

/* =====================================================================
   SELECT & CONFIRM
   ===================================================================== */
function onSelectChip(chipId, el) {
  if(el.classList.contains('used')) return;
  // deselect previous
  document.querySelectorAll('.picker-chip.chip-selected').forEach(c => c.classList.remove('chip-selected'));
  if(selectedChipId === chipId) {
    // tapping same chip deselects
    selectedChipId = null;
  } else {
    selectedChipId = chipId;
    el.classList.add('chip-selected');
  }
  updateConfirmBtn();
}

function updateConfirmBtn() {
  const btn = document.getElementById('btn-confirm');
  if(selectedChipId) {
    btn.classList.add('active');
  } else {
    btn.classList.remove('active');
  }
}

document.getElementById('btn-confirm').addEventListener('click', confirmSelection);
document.getElementById('btn-confirm').addEventListener('touchend', e => { e.preventDefault(); confirmSelection(); });

function confirmSelection() {
  if(!selectedChipId || !activeZone) return;
  const chip = ALL_CHIPS.find(c => c.id === selectedChipId);
  if(!chip) return;
  const zone = activeZone.el;
  const { figureId, type } = activeZone;

  closePicker();

  const isCorrect = !chip.isDecoy && chip.figureId === figureId && chip.type === type;

  if(isCorrect) {
    zone.classList.add('correct');
    const fig = FIGURES.find(f => f.id === figureId);
    zone.innerHTML = `<span class="zone-label">${fig.formulas[type].label}</span><span>\\(${chip.latex}\\)</span>`;
    document.getElementById(`pchip-${chip.id}`).classList.add('used');
    correctCount++;
    updateScore();
    const cardZones = document.querySelectorAll(`[data-figure="${figureId}"]`);
    if([...cardZones].every(z => z.classList.contains('correct'))) {
      document.getElementById(`card-${figureId}`).classList.add('matched');
    }
    if(window.MathJax) MathJax.typesetPromise([zone]);
    checkWin();
  } else {
    zone.classList.add('wrong');
    setTimeout(() => zone.classList.remove('wrong'), 400);
  }
}

/* =====================================================================
   HELPERS
   ===================================================================== */
function updateScore() {
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('total-count').textContent = totalPairs;
}
function checkWin() {
  if(correctCount === totalPairs)
    document.getElementById('success-banner').style.display = 'block';
}

document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('success-banner').style.display = 'none';
  buildUI();
});

document.getElementById('btn-hint').addEventListener('click', () => {
  const unfilled = CORRECT_CHIPS.filter(c => {
    const zone = document.getElementById(`zone-${c.figureId}-${c.type}`);
    return zone && !zone.classList.contains('correct');
  });
  if(!unfilled.length) return;
  const pick = unfilled[Math.floor(Math.random()*unfilled.length)];
  const zone = document.getElementById(`zone-${pick.figureId}-${pick.type}`);
  if(!zone) return;
  zone.classList.add('correct');
  const fig = FIGURES.find(f => f.id === pick.figureId);
  zone.innerHTML = `<span class="zone-label">${fig.formulas[pick.type].label}</span><span>\\(${pick.latex}\\)</span>`;
  const chipEl = document.getElementById(`pchip-${pick.id}`);
  if(chipEl) chipEl.classList.add('used');
  correctCount++;
  updateScore();
  if(window.MathJax) MathJax.typesetPromise([zone]);
  const cardZones = document.querySelectorAll(`[data-figure="${pick.figureId}"]`);
  if([...cardZones].every(z => z.classList.contains('correct'))) {
    document.getElementById(`card-${pick.figureId}`).classList.add('matched');
  }
  checkWin();
});

/* ===== INIT ===== */
buildUI();
window.addEventListener('load', () => { if(window.MathJax) MathJax.typesetPromise(); });
</script>
